# docker-compose.yaml — Agent Runtime + Dashboard
# Usage:
#   Minimal:  docker compose -f docker/docker-compose.yaml up
#   Full:     docker compose -f docker/docker-compose.yaml --profile full up
#
# NOTE: If builds hang, set COMPOSE_BAKE=false before running docker compose.
# The setup/cleanup scripts do this automatically.

services:
  runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    ports:
      - "7820:7820"
    volumes:
      - agent-data:/data
    environment:
      - DATA_DIR=/data
      - PORT=7820
      - AI_BACKEND=${AI_BACKEND:-claude}
      - IDLE_TIMEOUT_MS=${IDLE_TIMEOUT_MS:-300000}
      - MAX_AGENTS=${MAX_AGENTS:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MODE=standalone
      - MEMORY_URL=${MEMORY_URL:-http://memory:7822}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PI_API_KEY=${PI_API_KEY:-}
      - PI_MODEL=${PI_MODEL:-}
      - XDG_CONFIG_HOME=/data/cli-config
      - CLAUDE_CONFIG_DIR=/data/cli-config/claude
      - CODEX_HOME=/data/cli-config/codex
      - GEMINI_CLI_HOME=/data/cli-config/gemini
    depends_on:
      memory:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:7820/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "7821:7821"
    environment:
      - RUNTIME_URL=http://runtime:7820
      - NODE_ENV=production
      - MEMORY_URL=${MEMORY_URL:-http://memory:7822}
    depends_on:
      runtime:
        condition: service_healthy
    restart: unless-stopped

  memory:
    image: ghcr.io/fysoul17/pyx-memory:0.1.8-beta
    ports:
      - "7822:7822"
    volumes:
      - memory-data:/data
    mem_limit: 3g
    memswap_limit: 3g
    environment:
      - DATA_DIR=/data
      - MEMORY_SERVER_PORT=7822
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:7822/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    profiles:
      - full

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    profiles:
      - full

volumes:
  agent-data:
    driver: local
  memory-data:
    driver: local
  neo4j-data:
    driver: local
